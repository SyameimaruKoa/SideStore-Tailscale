services:
    sidestore-vpn:
        image: ghcr.io/xddxdd/sidestore-vpn:tailscale
        container_name: sidestore-tailscale
        restart: always
        cap_add:
            - NET_ADMIN
        devices:
            - /dev/net/tun:/dev/net/tun
        volumes:
            - ./state:/var/lib/tailscale
        environment:
            - TS_AUTHKEY=tskey-auth-~~~~~
            - TS_HOSTNAME=sidestore-vpn
            - TS_STATE_DIR=/var/lib/tailscale # ノードを永続化